<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>要小入学準備チェックリスト</title>
<style>
body {
  margin: 0;
  background: #f5f7fb;
  color: #1f2937;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
}
.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 16px 14px 40px;
}
h1 {
  font-size: 24px;
  line-height: 1.35;
  margin: 0 0 14px;
}
.status {
  position: sticky;
  top: 0;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 12px 14px;
  margin-bottom: 14px;
  z-index: 10;
}
.count {
  font-size: 20px;
  font-weight: 700;
}
.subcount {
  font-size: 14px;
  color: #4b5563;
  margin-top: 4px;
}
.bar {
  height: 10px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 8px;
}
.fill {
  height: 100%;
  width: 0%;
  background: #10b981;
}
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
button {
  border: 0;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 700;
  color: white;
  background: #374151;
}
.card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  padding: 10px 12px;
  margin-bottom: 14px;
}
h2 {
  font-size: 18px;
  margin: 6px 4px 10px;
}
.row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 12px 6px;
  border-top: 1px solid #e5e7eb;
}
.row:first-of-type {
  border-top: 0;
}
input[type="checkbox"] {
  width: 28px;
  height: 28px;
  margin: 2px 0 0;
  flex: 0 0 28px;
}
.text {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.name {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.45;
}
.note {
  font-size: 13px;
  color: #4b5563;
  line-height: 1.55;
}
.done .name, .done .note {
  color: #9ca3af;
  text-decoration: line-through;
}
.note-box {
  background: #fffdf5;
  border: 1px solid #f3e8b3;
}
.note-list {
  margin: 8px 0 4px 0;
  padding-left: 20px;
  color: #374151;
  line-height: 1.7;
  font-size: 14px;
}
.foot {
  color: #6b7280;
  font-size: 12px;
  line-height: 1.6;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="wrap">
  <h1>要小入学準備チェックリスト</h1>

  <div class="status">
    <div class="count"><span id="doneHome">0</span> / <span id="totalHome">0</span> 完了</div>
    <div class="subcount">家で用意するもの：<span id="percentHome">0</span>%</div>
    <div class="bar"><div id="fillHome" class="fill"></div></div>
  </div>

  <div class="actions">
    <button onclick="clearAll()">チェックを全部外す</button>
  </div>

  <section class="card">
    <h2>家で用意するもの</h2>
    <label class="row"><input type="checkbox" id="home1" data-group="home" onchange="update()"><span class="text"><span class="name">通学用かばん</span><span class="note">自立するもの／学校専用／ランドセルでなくても軽いかばんでも可</span></span></label><label class="row"><input type="checkbox" id="home2" data-group="home" onchange="update()"><span class="text"><span class="name">ふで箱</span><span class="note">金物不可／シンプル／無地</span></span></label><label class="row"><input type="checkbox" id="home3" data-group="home" onchange="update()"><span class="text"><span class="name">消しゴム</span><span class="note">学習用／無地／よく消えるもの</span></span></label><label class="row"><input type="checkbox" id="home4" data-group="home" onchange="update()"><span class="text"><span class="name">鉛筆5本</span><span class="note">2B／六角形</span></span></label><label class="row"><input type="checkbox" id="home5" data-group="home" onchange="update()"><span class="text"><span class="name">赤青鉛筆1本</span></span></label><label class="row"><input type="checkbox" id="home6" data-group="home" onchange="update()"><span class="text"><span class="name">下じき</span><span class="note">無地</span></span></label><label class="row"><input type="checkbox" id="home7" data-group="home" onchange="update()"><span class="text"><span class="name">雑巾</span></span></label><label class="row"><input type="checkbox" id="home8" data-group="home" onchange="update()"><span class="text"><span class="name">給食袋</span></span></label><label class="row"><input type="checkbox" id="home9" data-group="home" onchange="update()"><span class="text"><span class="name">ランチョンマット</span></span></label><label class="row"><input type="checkbox" id="home10" data-group="home" onchange="update()"><span class="text"><span class="name">口拭き用タオル</span></span></label><label class="row"><input type="checkbox" id="home11" data-group="home" onchange="update()"><span class="text"><span class="name">校帽</span><span class="note">スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home12" data-group="home" onchange="update()"><span class="text"><span class="name">体育着</span><span class="note">推奨／スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home13" data-group="home" onchange="update()"><span class="text"><span class="name">赤白帽子</span><span class="note">つばあり・つばなしどちらでも可／スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home14" data-group="home" onchange="update()"><span class="text"><span class="name">上履き</span><span class="note">推奨／スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home15" data-group="home" onchange="update()"><span class="text"><span class="name">防災頭巾</span><span class="note">スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home16" data-group="home" onchange="update()"><span class="text"><span class="name">防災頭巾カバー</span><span class="note">スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home17" data-group="home" onchange="update()"><span class="text"><span class="name">体育着袋</span><span class="note">体育着と赤白帽子を入れる／上をひもでしぼる巾着タイプ／スクールプラザ和田やで取扱い</span></span></label><label class="row"><input type="checkbox" id="home18" data-group="home" onchange="update()"><span class="text"><span class="name">上履き袋</span></span></label><label class="row"><input type="checkbox" id="home19" data-group="home" onchange="update()"><span class="text"><span class="name">手提げバッグ</span><span class="note">毎週末の持ち帰り用／体育着袋・上履き袋が入る大きさ／床につかない大きさ／折りたためる素材</span></span></label><label class="row"><input type="checkbox" id="home20" data-group="home" onchange="update()"><span class="text"><span class="name">折りたたみ傘（学童用）</span></span></label>
  </section>

  <section class="card note-box">
    <h2>注）</h2>
    <ul class="note-list">
      <li>全ての持ち物に平仮名で記名</li><li>油性マジック・名前シール可</li><li>バッグ類は内側に平仮名で記名</li><li>体育着は要マークの下に縦5cm×横8cmの布を縫い付け、平仮名で姓だけ記名</li><li>上履きは平日は学校に置き、週末持ち帰って洗う</li>
    </ul>
  </section>

  <div class="foot">印刷本文ベースで作成。</div>
</div>

<script>
function allBoxes() {
  return Array.prototype.slice.call(document.querySelectorAll('input[type="checkbox"]'));
}

function homeBoxes() {
  return Array.prototype.slice.call(document.querySelectorAll('input[data-group="home"]'));
}

function update() {
  var boxes = allBoxes();
  var homes = homeBoxes();
  var doneHome = 0;

  for (var i = 0; i < boxes.length; i++) {
    var row = boxes[i].parentNode;
    if (boxes[i].checked) row.classList.add('done');
    else row.classList.remove('done');
  }

  for (var j = 0; j < homes.length; j++) {
    if (homes[j].checked) doneHome++;
  }

  var totalHome = homes.length;
  var percent = totalHome ? Math.round(doneHome * 100 / totalHome) : 0;

  document.getElementById('doneHome').textContent = String(doneHome);
  document.getElementById('totalHome').textContent = String(totalHome);
  document.getElementById('percentHome').textContent = String(percent);
  document.getElementById('fillHome').style.width = percent + '%';

  save();
}

function save() {
  var boxes = allBoxes();
  var state = [];
  for (var i = 0; i < boxes.length; i++) {
    state.push(boxes[i].checked ? '1' : '0');
  }
  try {
    localStorage.setItem('school_checklist_light_v4', state.join(','));
  } catch (e) {}
}

function load() {
  var boxes = allBoxes();
  var raw = '';
  try {
    raw = localStorage.getItem('school_checklist_light_v4') || '';
  } catch (e) {}
  if (raw) {
    var arr = raw.split(',');
    for (var i = 0; i < boxes.length && i < arr.length; i++) {
      boxes[i].checked = arr[i] === '1';
    }
  }
  update();
}

function clearAll() {
  var boxes = allBoxes();
  for (var i = 0; i < boxes.length; i++) boxes[i].checked = false;
  update();
}

window.onload = load;
</script>
</body>
</html>
